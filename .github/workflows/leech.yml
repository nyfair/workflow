name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv68.mexa.sh:183/d/7nsosj2hxoy775ghpt2ruty5axyivp55mdwrucb6c4c2rwespzv42byw7us6bo6zgv2mx35m/A-RJ01408142.part7.rar
        - https://srv29.mexa.sh:183/d/evspuj2hxoy775ghpt2qahk7legji37rkrxvtkmep76kru7pkxfzc5ogecbb5t4wahcmlfkp/A-RJ01408142.part3.rar
        - https://srv445.mexa.sh:183/d/yjsoej2hxoy775ghpt2ryectkfgjuxdqqaz4hogorfzgpio65rx2wkd3xux4dh3jw3ewhcuy/A-RJ01408142.part5.rar
        - https://srv19.mexa.sh:183/d/4fsouj2hxoy775ghpt2q6sa7a7qr3s5qxzmnqqhagswvzyty5jpkvtx2tpnz7oq3gpadozrg/A-RJ01408142.part6.rar
        - https://srv28.mexa.sh:183/d/ursomj2hxoy775ghpt2q6hiyc72og6fuaxjo765mvur3eggoidhvjgchqtjkd4qtr3ub5l56/A-RJ01408142.part4.rar
        - https://srv683.mexa.sh:183/d/zzspaj2hxoy775ghpt2ragc4k4dvaq433d6xiojp6rvmvvztn4pz6gnfyez4ll7bzeneon2x/A-RJ01408142.part2.rar
        - https://srv213.mexa.sh:183/d/crspmj2hxoy775ghpt2q4tkhko2qvkparzkemajqchbtdbsqzc2fkry4gktkxwxmzcuxdoa5/A-RJ01408142.part1.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
