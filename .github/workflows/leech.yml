name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv734.mexa.sh:183/d/zfsf6g2gxoy775ghbp2qofqqbhn5zfh2yfk3cg6knbluwzr6yyq5p2tuwos7j4t2k2g64ulx/G-RJ01460421.zip
        - https://srv642.mexa.sh:183/d/dzsfkokgxoy775ghbh2qaeq7adld52bsqlexytlg7ivwiu6t4vmz7hl6qugbwyv3oqw74tbc/Game-RJ01458403.rar
        - https://srv198.mexa.sh:183/d/vjsd3jsfxoy775ghad2qcgs6bvsm7znxwbo2iu5exysua5iktqyy7jxgr7ijjo64nvja6vlh/G-RJ01458968.zip
        - https://srv213.mexa.sh:183/d/crsf4gkgxoy775ghbp2rsskfakiaqwfn55rkt2lbzl6wdhv6c7fr7ldiohlziaxxjagj7mhi/DLJ-01042589_v25.09.12-JP-CHS-EN.part1.rar
        - https://srv653.mexa.sh:183/d/d5seegkgxoy775ghbp2rshk2audtxf3z7afjwotaytl3xn455k6oornxzd26hgtvzfoio4l6/DLJ-01042589_v25.09.12-JP-CHS-EN.part2.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
