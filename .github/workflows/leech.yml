name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv68.mexa.sh:183/d/7nskxxkbxoy775ghkh2qwb2hkucphuv7rdxihfatlsf5vfisuttleolyovsohl7qrmtbutx7/Game-RJ01214867_v1.313.part1.rar
        - https://srv683.mexa.sh:183/d/zzsjhxkbxoy775ghkh2qefkdcg6lqfn2c3k6aw5or6hm32rewb62nzl7ddlldszumjs64rsc/Game-RJ01214867_v1.313.part2.rar
        - https://srv6.mexa.sh:183/d/6bskzxkbxoy775ghkh2quea5bzofwcy3hyzgqhvlc6rsra643krf5bhbxsog6p56oalefshc/Game-RJ01214867_v1.313.part3.rar
        - https://srv131.mexa.sh:183/d/5vsc7mczxoy775ghgx2qeccfawokizfvo4muqobn5waivankay26zbqnrxcoflxnxus4bzf3/G-RJ01166703-v25.08.02.part1.rar
        - https://srv495.mexa.sh:183/d/vfsc5mczxoy775ghgx2vwdc5kdpmvzrg5sbtu3wa7twwikxx3ijxzfn3dfo3gbtpuacv4oq3/G-RJ01166703-v25.08.02.part2.rar
        - https://srv825.mexa.sh:183/d/yvsczmczxoy775ghgx2r4sc2aswkj7njkusosn7vkdptek4htivujsvrwdzfli2t5vswvpef/G-RJ01166703-v25.08.02.part3.rar
        - https://srv495.mexa.sh:183/d/vfscrmczxoy775ghgx2vcgsnb335w5o3bqktuxylwm2adhlfqjdg5jgdhwbnoy3q3knf5vmd/G-RJ01166703-v25.08.02.part4.rar
        - https://srv55.mexa.sh:183/d/efsb7mczxoy775ghgx2qcck4a3s5qklk5ephswmaa2jg3sz2zm4hiachlffrjnxephopd7sm/G-RJ01166703-v25.08.02.part5.rar
        - https://srv29.mexa.sh:183/d/evsb3mczxoy775ghgx2vseq5at6vfm25sgtzaovqdbnfeiw3ejevh5rl73ialxpalocp7rb5/G-RJ01166703-v25.08.02.part6.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
