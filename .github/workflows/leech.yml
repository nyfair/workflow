name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv3.mexa.sh:183/d/ijspm4s7xoy775gh5h3bqscyk4x5n4rj6v3mekcanutzxinwwmqpvwhxatkhewqmrhx3e75a/DLJ-01074279_v24.10.10-JP-CHT-EN.part2.rar
        - https://srv859.mexa.sh:183/d/ybshzwdfxoy775ghxd3vshclkvmttkei5zxrckrb5sasvrdytzact5jc7tr3lfvgwixeqzjt/G-RJ01276936-v1.02.zip
        - https://srv389.mexa.sh:183/d/7bspo4s7xoy775gh5h3bat2blccfomqvgg6rjycdd22mq6yby5hsbrrl4izub4gq56fmuna7/DLJ-01074279_v24.10.10-JP-CHT-EN.part1.rar
        - https://srv103.mexa.sh:183/d/hfsgx6syxoy775ghyx3fwea5kmpjtahaqojib6pjg6g2swncle7wcnmgkeyhir2j63voffhh/DLJ-01236860_v25.03.19_DLC-JP.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
