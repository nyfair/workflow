name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://mega.nz/file/JmBw0DST#9iGGiQ8ynMTbtJt4s1rfh0fItSCA-t5-WKD4us_wNIk
        - https://mega.nz/file/NiwhQJCT#GNqZH51C2oWFMFnEmILWfta-nLKS5vB0mbheN15JqEc
        - https://mega.nz/file/FnR0xTaa#TwmRG9tCcywrRMOhF6tDyAM2ZltZCtleWHBpXzTYHbA
        - https://mega.nz/file/EnJEmZZR#k2L0w2zzzbomsCD6JgpxhS5z7-yOORGvaQpyFhWNH_E
        - https://mega.nz/file/FnhG3SSR#BykNDT8DHVUtVOwNVBSWXcVZ2uoRLFV9H7zvHbkipuQ
        - https://mega.nz/file/1ix3yaRT#TrqXOWOK5lstlmOzFBoHLy03qEeeziydUnsJjiF9858
        - https://mega.nz/file/IqRxWCRC#x0qXxQ2Whov0XLRUgK0NTrYI4P_rqOeKc6bPM9Pj3qM
        - https://mega.nz/file/1y5U2agR#oVinUOcgxqObVp81Dy3bji-jX9DCLZtIqvM9_7jMmJ4
        - https://mega.nz/file/RUlxnT4J#zdCfmUrYcjiqhNmgSUodC57JrdG3rWrQqNfEZEUTavs
        - https://mega.nz/file/6ZEyQZpJ#lEPEQkVA3l1kr_Msi0QXjtP1krbhyKWFgXP_pNqqjuQ
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
