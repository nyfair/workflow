name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv241.mexa.sh:183/d/7jsfi4s7xoy775gh5h3f6skckw4ixdfxfflcigd23iy4ibsb5w5edzyi3ypoiladlgzgzsyg/Game-RJ01302728.part2.rar
        - https://srv241.mexa.sh:183/d/7jsgo4s7xoy775gh5h3bufczb43zilrrxpgu2txbkcyyo2cdy5zsnpxq7snjcssec4rth372/Game-RJ01302728.part1.rar
        - https://srv683.mexa.sh:183/d/zzshs4s7xoy775gh5h3a6f2mat7jxkkgo7q6den265t4yz3uckr5gaz74mmjt2xcjaacmvhm/Game-RJ01302728.part3.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
