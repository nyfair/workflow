name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv13.mexa.sh:183/d/kvsajekbxoy775ghl32qqskdbpl6zlzy4356kfjh46s4efnmsf73wrltw5q2pfjueheuikym/G-RJ01219535-v2.05.part1.rar
        - https://srv111.mexa.sh:183/d/vbsavekbxoy775ghl32qydk7bo7lvfm6qcvtevcmrqpurmeetqpi4aaa7gn5evisxpqn6jto/G-RJ01219535-v2.05.part2.rar
        - https://srv976.mexa.sh:183/d/3nshdekbxoy775ghl32raei7bbvvgnfb6fvrgpd6jxnqn6dznvwchu7ybtzqvjpixjbj6pml/G-RJ01219535-v2.05.part3.rar
        - https://srv16.mexa.sh:183/d/6jshxekbxoy775ghl32qefs5lglxvovrgu6o24q3e7luaiutiksu6qdgy62sg4spr2h6ybcl/G-RJ01219535-v2.05.part4.rar
        - https://srv13.mexa.sh:183/d/kvsgjekbxoy775ghl32q4fknamvbtkwyx5hlw6oup5fg3k6fzlgyi4pdevezyukjgrtsewcc/G-RJ01219535-v2.05.part5.rar
        - https://srv43.mexa.sh:183/d/v5sltrs2xoy775ghht2qocc2a3o6vd3eq44pxgwt3752t3ijdvdcsbqrkjriw64ewh7tx4em/Game-RJ01384149-v1.0.4.part1.rar
        - https://srv2.mexa.sh:183/d/2jskprs2xoy775ghht2v4bczbjq7aii3x73zvqy2oxvew4bifsnm2n2ingfx4zc6igzz3vcb/Game-RJ01384149-v1.0.4.part2.rar
        - https://srv55.mexa.sh:183/d/efslrrs2xoy775ghht2qihk6ca6vhbe5wmzab462izlhpj4cd2i6b3sn75szlj6xkjlxcg3u/Game-RJ01384149-v1.0.4.part3.rar
        - https://srv520.mexa.sh:183/d/ajsljrs2xoy775ghht2rqck5bnecwdtt5kapdzyhhfuho2lnmfg4bnvjrhoezw4nac7hyjql/Game-RJ01384149-v1.0.4.part4.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
