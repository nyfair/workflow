name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv19.mexa.sh:183/d/4fsejzs7xoy775gh2l3bcfkoldunc4ye2bbzw7li5zuyrfta5pdf7htupuijdjsiihiksrri/DMJ-aman_0741no-JP.part1.rar
        - https://srv136.mexa.sh:183/d/gfsdiws4xoy775ghqh3aabqylbzj6aqyxe6nhx24letkhe6hrtypdovb7yedxi3ypzpnazaz/DMJ-aman_0720no-JP.rar
        - https://srv25.mexa.sh:183/d/2zsefzs7xoy775gh2l3aqecibja7rj2eujnegdanxrtwe5fncadcylbe42gs4yiqgu3xr6qo/DMJ-aman_0741no-JP.part2.rar
        - https://srv445.mexa.sh:183/d/yjsbmtcwxoy775ghl73awga5bookwh2bq6blllogr36r3dyhy5qijbytjvix2czzx74tjevz/DMJ-aman_0647no-JP.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
