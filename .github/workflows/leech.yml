name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://mega.nz/file/BHtDBCRA#5Fz84iYc-1ypvZ_aTSZAjIeTqQ7CpPwMya33ja6mfJY
        - https://mega.nz/file/QKkFRCYI#D1jRVXkY8ciYdVYaIqN5KwkIVZTreMulHMEWNkumUCQ
        - https://mega.nz/file/VHtHzCLT#uhK5nlR8iztzpuTUBgsO5c0hkvekHXOhNfwUSlUbQaM
        - https://mega.nz/file/ZOsxQYAK#LDWzGsNqXP30i1rCbPJ7K-0GALAbFsKu8rrrz6wwr44
        - https://srv581.mexa.sh:183/d/6rsaka2cxoy775ghi32qkrsykqphzzbngo6q4c26w5abqymep7i46mf6fmoi5vdmpau2eut3/G-RJ01453947.part1.rar
        - https://srv9.mexa.sh:183/d/2bsawa2cxoy775ghi32qkg2fdespsqfyrvis7xscrdsfpookqq6ood23fmbiotmvjnnhfaec/G-RJ01453947.part2.rar
        - https://srv859.mexa.sh:183/d/ybshua2cxoy775ghi32qurq6c6246h55k75hljqyr3w7ditr2g46gmypewrl7trhhjhlaen3/G-RJ01453947.part5.rar
        - https://srv182.mexa.sh:183/d/7zshca2cxoy775ghi32r4cyrb6nlagp6touhzpkhii55ksbd6mgpwjvu4z2lzksieezbd5rv/G-RJ01453947.part3.rar
        - https://srv29.mexa.sh:183/d/evshwa2cxoy775ghi32vsfsza5wttuwgq5mrdi2n4kqyrocwa4o4gdhzepbupe4qgnzeeidi/G-RJ01453947.part4.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
