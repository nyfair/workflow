name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://mega.nz/file/QJ4HxCIZ#7NSNFhYvcQhUV7vFVs7CXfPYuLZF6zMmMIawg3gQUOY
        - https://mega.nz/file/iNlSkCKQ#hH29NhvdFHZrkHxn5btqI1Ur1s5iMj2R7Xdnhg6jlmQ
        - https://mega.nz/file/fR8mwAKK#KVLXy082g2KdiX1ukYoL3CaBwqIbx-Uyp470pdA3cDo
        - https://mega.nz/file/DAlQATpT#3UgeLzQ8HewbmX7cf-UWVDqthp-WntKNYoDiTqwLen0
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
