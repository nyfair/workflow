name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv520.mexa.sh:183/d/ajskutcaxoy775ghmt2ques7kfvoyj7mw2clm44jtxzcsjelfbqb37wsz4plh72zw2gcjr7d/Ani-RJ01387326-Ver.25.09.29.part5.rar
        - https://srv14.mexa.sh:183/d/kzskwtcaxoy775ghmt2vcgazaoaud7nbhthmbfjua5gkyolz2ddcdvdv73xu2bzelgudb725/Ani-RJ01387326-Ver.25.09.29.part6.rar
        - https://srv2.mexa.sh:183/d/2jsjmtcaxoy775ghmp2qos2hlebnkmhmfnhwvgou7lau6j5kbp3yqe6fhcds76lrtnwerfeb/Ani-RJ01387326-Ver.25.09.29.part4.rar
        - https://srv13.mexa.sh:183/d/kvskytcaxoy775ghmt2vshkyapdgcvlp3zq67gw2v7y346liwltuhyq2ia6v27nux7bh5f36/Ani-RJ01387326-Ver.25.09.29.part3.rar
        - https://srv48.mexa.sh:183/d/2fskitcaxoy775ghmt2rcsy7bzmjzbfj3h3jp2dlwpog6i5i7ncgov2ojocpqyuwmkqh57cw/Ani-RJ01387326-Ver.25.09.29.part2.rar
        - https://srv61.mexa.sh:183/d/vrsk6tcaxoy775ghmt2qqg22kv4sjcgtatafkajjqabaz6conapeo37v7dku4uqb45lzv646/Ani-RJ01387326-Ver.25.09.29.part1.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
