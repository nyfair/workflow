name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://srv36.mexa.sh:183/d/djsd5qsfxoy775ghat2qch2flb7kpdhocid6jddsa7l6dxrisboiiinqrfdr4p43jlq7n6xh/DLJ-01424333-CN.part2.rar
        - https://srv520.mexa.sh:183/d/ajsdzqsfxoy775ghat2qycc7c3yktld7vzvlcya7knhhuzwn24d7mixsfjhdpmn7bkhrcpzy/DLJ-01430818-CN.rar
        - https://srv6.mexa.sh:183/d/6bscjqsfxoy775ghat2v4sctdfjnqviafntaaadlicfyjma4j7vdaqe5qm46kdevvcpi3u6j/DLJ-01454736-CN.rar
        - https://srv28.mexa.sh:183/d/ursddqsfxoy775ghat2qmf25btlwwgtuc5bsq4a5uvqyevio2yy72fwg74jhrfltsgs4gc2x/DLJ-01424333-CN.part1.rar
        - https://srv36.mexa.sh:183/d/djshnm2txoy775ghqp3bgsclk6vpophxst6vjfa4xbz6etze3hlfbn4m4rsudh3lwtqxokj6/DLJ-01391105-CHT.rar
        - https://srv7.mexa.sh:183/d/znsdhqsfxoy775ghat2q2dk5lgawymdxzw5agq6pdtyrsn6d3yws3a4a43eejlluh5mv2uzo/DLJ-01339344-CN.rar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
