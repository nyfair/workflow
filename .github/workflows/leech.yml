name: leech

on:
  push:
    paths:
    - '.github/workflows/leech.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        url:
        - https://mega.nz/file/cN5HgLba#IyoPdKsCnzTQLNyroBPuCqHS4sVnHHzOzmXGYovQp8c
        - https://mega.nz/file/ZJIRRaoL#Ig8onjjauu9yOkPzwr9Jq5hgs1dKqklGTfhUBokg30c
        - https://mega.nz/file/dYAUgYqA#eNrp6ZwoLt1S7cc-RGLOZ4xskDq3hjlvCqI26Gxb9Ok
        - https://mega.nz/file/hcRk0ADZ#ofJXlQ6YyLM-G-ajGb-uqUtHWLBcW9epIK5O1wCw5kQ
        - https://mega.nz/file/ggQkESgL#yBa8-uZNZPoklv9Gh3EENXaGBNnqC04o1hqv6sd_gzg
        - https://mega.nz/file/AwoWWCJR#JHbm42k_e7sBwEMndARVLWJboyv3_CeFwv0wqV1N_sQ
        - https://mega.nz/file/0lYxgZBS#yEnKYWD56wHXG9Bv03x-tvlUKThDQfounb4ZsnmQkiM
        - https://mega.nz/file/cwBXEaYI#ZPuqhNZ5hozSWE6-m1sa8m8kPOvXFAzD_LNg13ln8jI
        - https://mega.nz/file/s44QmLRL#EMqh2VIqKuJGfwM5YdHC-X3kjzjBb4bzAW-7jxAFEB0
        - https://mega.nz/file/VoBjQRjL#fL3Ql93s9k0TXtp278o2DL1l9yHBv1vacU_zpLIM8kM
        - https://mega.nz/file/k5ZW3LCa#I5kMQMIlwBiVY4rzlHvT3rICY0rau5d2uFIEbwSdELY
        - https://mega.nz/file/opwXjTwC#4N0b7V0yptGtN0kf3Ccp7kpABXf0DtEV6Jq-aao_XnI
        - https://mega.nz/file/pxxFmIjZ#Yw0Akt6p6mYxfWmTfYukVPi0YRKMNrgY9NmcDSd731s
        - https://mega.nz/file/NgZnwbhK#2r3hziLsO_km-CARwPU6pW3--bM_pptC6Af4VCWJQNQ
        - https://mega.nz/file/FwxxRSRb#ZIlVUcTmbkSL--jWsS2bcMXuPfv_vA0hdjOOE7IOiJU
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache@v4
      id: cache
      with:
        path: megatools-1.11.5.20250706-linux-x86_64
        key: megatools-1.11.5.20250706-linux-x86_64
    - name: Mega
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -OL https://xff.cz/megatools/builds/builds/megatools-1.11.5.20250706-linux-x86_64.tar.gz
        tar xvf *.gz
    - name: Leech
      run: |
        mkdir leech && cd leech
        if [[ ${{ matrix.url }} == *"mega.nz"* ]]
        then
          ../megatools*/megatools dl --path ./ ${{ matrix.url }}
        elif [[ ${{ matrix.url }} == *"drive.google"* ]]
        then
          # gdown https://drive.google.com/uc?id=
          pip install gdown && gdown ${{ matrix.url }}
        else
          curl -OL --insecure ${{ matrix.url }}
        fi
        find . -size +2000M -exec split -b 1G --numeric-suffixes=1 {} {}.0 \;
        find . -size +2000M -exec rm {} \;
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: leech/*
        tag: cache
        overwrite: true
        file_glob: true
